<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark" data-font-size="medium">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="黃金、白銀與布蘭特原油價格趨勢 Dashboard" />
  <title>全球貴金屬與原油價格 Dashboard</title>
  <script>
    (() => {
      const storedTheme = localStorage.getItem("commodity-theme");
      const preferredTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      document.documentElement.dataset.theme = storedTheme || preferredTheme;

      const storedFontSize = localStorage.getItem("commodity-font-size");
      document.documentElement.dataset.fontSize = ["small", "medium", "large"].includes(storedFontSize)
        ? storedFontSize
        : "medium";
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="font-size.css" />
  <link rel="stylesheet" href="asset-toggle.css" />
</head>
<body>
  <main class="shell" id="pageTop">
    <div class="sticky-zone">
      <header class="hero">
        <div>
          <p class="eyebrow">COMMODITY MARKET MONITOR</p>
          <h1>全球貴金屬與原油價格</h1>
          <p class="subtitle">追蹤黃金、白銀與布蘭特原油的歷史價格、區間漲跌與相對表現。</p>
        </div>
        <div class="hero-actions">
          <div id="fontSizeControl" class="font-size-control" role="group" aria-label="調整畫面字級">
            <button type="button" data-font-size="small" aria-label="使用小字級" title="小字級">A−</button>
            <button type="button" data-font-size="medium" aria-label="使用標準字級" title="標準字級">A</button>
            <button type="button" data-font-size="large" aria-label="使用大字級" title="大字級">A＋</button>
          </div>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換顯示模式" title="切換顯示模式">
            <span id="themeIcon" class="theme-icon" aria-hidden="true">☀</span>
            <span id="themeLabel">淺色模式</span>
          </button>
          <div class="updated-box">
            <span>資料更新</span>
            <strong id="updatedAt">載入中…</strong>
          </div>
        </div>
      </header>

      <div id="demoBanner" class="notice hidden" role="status">
        目前顯示範例資料；GitHub Actions 第一次成功執行後，會自動替換成市場資料。
      </div>

      <section class="controls card" aria-label="圖表控制">
        <div class="control-group grow">
          <label>顯示商品</label>
          <div id="assetToggles" class="asset-toggles"></div>
        </div>

        <div class="control-group">
          <label for="viewMode">比較模式</label>
          <select id="viewMode">
            <option value="price">實際價格</option>
            <option value="normalized">區間漲跌（起點 = 100）</option>
          </select>
        </div>

        <div class="control-group">
          <label>快速區間</label>
          <div id="rangeButtons" class="range-buttons">
            <button data-range="1M">1M</button>
            <button data-range="3M">3M</button>
            <button data-range="6M">6M</button>
            <button data-range="YTD">YTD</button>
            <button data-range="1Y" class="active">1Y</button>
            <button data-range="3Y">3Y</button>
            <button data-range="5Y">5Y</button>
            <button data-range="MAX">MAX</button>
          </div>
        </div>

        <div class="control-group custom-range">
          <label>自訂日期</label>
          <div class="date-row">
            <input id="startDate" type="date" aria-label="開始日期" />
            <span>—</span>
            <input id="endDate" type="date" aria-label="結束日期" />
            <button id="applyCustom" class="primary">套用</button>
          </div>
        </div>
      </section>
    </div>

    <section id="summaryCards" class="summary-grid" aria-label="商品摘要"></section>

    <section class="chart-card card">
      <div class="chart-heading">
        <div>
          <h2 id="chartTitle">價格趨勢</h2>
          <p id="chartRangeLabel">—</p>
        </div>
        <div class="legend-note">期貨報價｜USD</div>
      </div>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
      <p class="source-note">
        Data source: Yahoo Finance via yfinance. Prices may be delayed and are for reference only, not investment advice.
      </p>
    </section>

    <footer style="margin-top:28px;padding:14px 0 4px;text-align:center;color:var(--accent);font-size:clamp(1rem,1.3vw,1.2rem);font-weight:900;letter-spacing:0.07em;text-shadow:0 0 12px color-mix(in srgb,var(--accent) 38%,transparent);">
      Designed by Andy Lee
    </footer>
  </main>

  <button id="topButton" class="top-button" type="button" aria-label="回到頁面頂端" title="回到頁面頂端">
    <span aria-hidden="true">↑</span>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="app.js"></script>
  <script src="font-size.js"></script>
</body>
</html>
